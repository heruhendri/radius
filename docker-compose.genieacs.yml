# docker-compose.genieacs.yml
#
# Template layanan GenieACS untuk diintegrasikan ke stack Salfanet-Radius.
# Merge ke docker-compose.yml utama Anda, atau jalankan terpisah:
#   docker compose -f docker-compose.genieacs.yml up -d
#
# GenieACS UI bawaan (genieacs-ui) TIDAK dijalankan — digantikan oleh
# Next.js External UI yang tersedia di /admin/genieacs.
#
# Versi GenieACS: 1.2.x (gernei/genieacs image)
# Pastikan MongoDB sudah berjalan dan dapat diakses dari container.

version: "3.9"

services:
  # ──────────────────────────────────────────────────────────────
  # CWMP — menerima inform dari CPE/modem (TR-069, port 7547)
  # ──────────────────────────────────────────────────────────────
  genieacs-cwmp:
    image: drumsergio/genieacs:1.2.10
    container_name: genieacs-cwmp
    restart: unless-stopped
    command: genieacs-cwmp
    environment:
      # Ganti ke URI MongoDB yang sesuai
      GENIEACS_MONGODB_CONNECTION_URL: "${GENIEACS_MONGODB_URL:-mongodb://mongo:27017/genieacs}"
      GENIEACS_CWMP_INTERFACE: "0.0.0.0"
      GENIEACS_CWMP_PORT: "7547"
      # Uncomment jika pakai auth
      # GENIEACS_CWMP_SSL: "false"
      # Log level: fatal, error, warn, info, debug, silly
      GENIEACS_DEBUG: "false"
      GENIEACS_LOG_FORMAT: "simple"
    ports:
      - "7547:7547"
    networks:
      - genieacs-net
    depends_on:
      - mongo

  # ──────────────────────────────────────────────────────────────
  # NBI — REST API bridge yang dipakai External UI (port 7557)
  # ──────────────────────────────────────────────────────────────
  genieacs-nbi:
    image: drumsergio/genieacs:1.2.10
    container_name: genieacs-nbi
    restart: unless-stopped
    command: genieacs-nbi
    environment:
      GENIEACS_MONGODB_CONNECTION_URL: "${GENIEACS_MONGODB_URL:-mongodb://mongo:27017/genieacs}"
      GENIEACS_NBI_INTERFACE: "0.0.0.0"
      GENIEACS_NBI_PORT: "7557"
      GENIEACS_DEBUG: "false"
      GENIEACS_LOG_FORMAT: "simple"
    ports:
      - "7557:7557"
    networks:
      - genieacs-net
    depends_on:
      - mongo

  # ──────────────────────────────────────────────────────────────
  # File Server — menyajikan firmware/config ke CPE (port 7567)
  # ──────────────────────────────────────────────────────────────
  genieacs-fs:
    image: drumsergio/genieacs:1.2.10
    container_name: genieacs-fs
    restart: unless-stopped
    command: genieacs-fs
    environment:
      GENIEACS_MONGODB_CONNECTION_URL: "${GENIEACS_MONGODB_URL:-mongodb://mongo:27017/genieacs}"
      GENIEACS_FS_INTERFACE: "0.0.0.0"
      GENIEACS_FS_PORT: "7567"
      GENIEACS_DEBUG: "false"
      GENIEACS_LOG_FORMAT: "simple"
    ports:
      - "7567:7567"
    networks:
      - genieacs-net
    depends_on:
      - mongo

  # ──────────────────────────────────────────────────────────────
  # MongoDB — database GenieACS
  # Hapus service ini jika MongoDB sudah berjalan di host atau
  # sudah ada di docker-compose utama.
  # ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: genieacs-mongo
    restart: unless-stopped
    volumes:
      - genieacs-mongo-data:/data/db
    networks:
      - genieacs-net
    # Port 27017 TIDAK dipublish ke host secara default (keamanan).
    # Uncomment baris di bawah jika External UI butuh akses MongoDB langsung
    # ports:
    #   - "127.0.0.1:27017:27017"

networks:
  genieacs-net:
    driver: bridge

volumes:
  genieacs-mongo-data:
